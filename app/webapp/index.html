<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proof of Delivery</title>
    <script id="sap-ui-bootstrap"
        src="https://ui5.sap.com/1.120/resources/sap-ui-core.js"
        data-sap-ui-theme="sap_horizon"
        data-sap-ui-compatVersion="edge"
        data-sap-ui-async="true"
        data-sap-ui-frameOptions="allow"
        data-sap-ui-resourceroots='{"zcpeldelivpod": "./"}'>
    </script>
    <script>
        sap.ui.getCore().attachInit(function () {
            sap.ui.require([
                "sap/ui/core/Component",
                "sap/ui/core/ComponentContainer"
            ], function (Component, ComponentContainer) {
                Component.create({
                    name: "zcpeldelivpod",
                    id: "zcpeldelivpod"
                }).then(function (oComponent) {
                    new ComponentContainer({
                        component: oComponent,
                        height: "100%"
                    }).placeAt("content");
                }).catch(function (oErr) {
                    console.error("Component.create failed:", oErr);
                });
            });
        });
    </script>
</head>
<body class="sapUiBody sapUiSizeCompact" id="content"></body>
</html>
